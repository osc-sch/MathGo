<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>
        <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/elegirRol.css">
  </head>
  <body>
    <div
      class="container min-vh-100 d-flex align-items-center justify-content-center"
    >
      <div class="card p-4 shadow" style="width: 100%; max-width: 420px">
        <div class="text-center mb-4">
          <h2 class="mb-1">¿Cómo querés registrarte?</h2>
          <p class="text-muted">Elegí tu rol para continuar</p>
        </div>
        <div class="d-flex flex-column gap-3">
          <a href="registroEstudiantes.html" class="text-decoration-none">
            <div class="card card-rol p-3 d-flex flex-row align-items-center gap-3">
              <div class="p-2 rounded" style="background: #e0f2fe">
                <i
                  class="bi bi-mortarboard-fill"
                  style="font-size: 1.5rem; color: #0369a1"
                ></i>
              </div>
              <div class="flex-grow-1">
                <p class="mb-0 fw-bold text-dark">Soy estudiante</p>
                <p class="mb-0 text-muted" style="font-size: 0.85rem">
                  Accedé a ejercicios y desafíos
                </p>
              </div>
              <i class="bi bi-chevron-right text-muted"></i>
            </div>
          </a>

          <a href="registroDocente.html" class="text-decoration-none">
            <div class="card p-3 d-flex flex-row align-items-center gap-3">
              <div class="p-2 rounded" style="background: #fef3c7">
                <i
                  class="bi bi-person-workspace"
                  style="font-size: 1.5rem; color: #92400e"
                ></i>
              </div>
              <div class="flex-grow-1">
                <p class="mb-0 fw-bold text-dark">Soy docente</p>
                <p class="mb-0 text-muted" style="font-size: 0.85rem">
                  Creá contenido y gestioná alumnos
                </p>
              </div>
              <i class="bi bi-chevron-right text-muted"></i>
            </div>
          </a>
        </div>
        <p class="text-center text-muted mt-4" style="font-size: 0.9rem">
          ¿Ya tenés cuenta?
          <a href="login.html" class="text-decoration-none">Iniciá sesión</a>
        </p>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
