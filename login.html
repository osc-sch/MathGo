<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathGo - Inicio sesión</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div
      class="container min-vh-100 d-flex align-items-center justify-content-center"
    >
      <div class="card p-4 shadow" style="width: 100%; max-width: 420px">
        <div id="mensajeError" class="alert alert-danger d-none" role="alert">
          Completa todos los campos
        </div>
        <h2 class="text-center mb-4">Iniciar Sesión</h2>
        <div class="mb-3">
          <label for="correo" class="form-label">Correo Electrónico</label>
          <input
            type="email"
            id="correo"
            class="form-control"
            placeholder="Correo Electrónico"
          />
        </div>
        <div class="mb-3">
          <label for="contraseña" class="form-label">Contraseña</label>
          <input
            type="password"
            id="contraseña"
            class="form-control"
            placeholder="Contraseña"
          />
        </div>
        <button
          type="button"
          class="btn btn-primary w-100"
          onclick="handleLogin()"
        >
          Ingresar
        </button>
      </div>
    </div>
    <script>
      function handleLogin() {
        const correo = document.getElementById("correo").value.trim();
        const contraseña = document.getElementById("contraseña").value.trim();
        if (!correo || !contraseña) {
          alert("Completa todos los campos requeridos");
          return;
        }
        alert("Bienvenido a MathGo");
      }
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
