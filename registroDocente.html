<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MathGo - Registro Docente</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="assets/css/login.css" />
  </head>
  <body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
      <div class="card p-4 shadow" style="width: 100%; max-width: 480px">
        <div class="text-center mb-4">
            <img src="assets/img/teacher.png"
    alt="Logo Docente"
    style="width: 80px;">
          <h2 class="mb-1">Crea tu cuenta</h2>
          <p class="text-muted">Completá tus datos para registrarte como Docente</p>
        </div>
        <div class="row g-3">
          <div class="col-6">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" id="nombre" class="form-control" placeholder="Tu nombre" />
          </div>
          <div class="col-6">
            <label for="apellido" class="form-label">Apellido</label>
            <input type="text" id="apellido" class="form-control" placeholder="Tu apellido" />
          </div>
          <div class="col-12">
            <label for="institucion" class="form-label">Institución</label>
            <input type="text" id="institucion" class="form-control" placeholder="Tu institución" />
          </div>
          <div class="col-12">
            <label for="telefono" class="form-label">Teléfono</label>
            <input type="tel" id="telefono" class="form-control" placeholder="Tu teléfono" />
          </div>
          <div class="col-12">
            <label for="correo" class="form-label">Correo electrónico</label>
            <input type="email" id="correo" class="form-control" placeholder="tu@correo.com" />
          </div>
          <div class="col-12">
            <label for="contrasena" class="form-label">Contraseña</label>
            <div class="input-group">
              <input type="password" id="contrasena" class="form-control" placeholder="Contraseña" />
              <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                <i class="bi bi-eye-fill" id="eyeIcon"></i>
              </button>
            </div>
          </div>
          <div class="col-12 mt-2">
            <button type="button" class="btn w-100 text-white" style="background-color: #6f42c1;" onclick="handleRegistro()" id="btnRegistrar">
              Crear cuenta
            </button>
          </div>
          <div class="col-12 text-center">
            <span>¿Ya tenés cuenta?</span>
            <a href="login.html">Iniciá sesión</a>
          </div>
        </div>
      </div>
    </div>
    <script src="assets/js/registroDocente.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
